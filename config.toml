# Phenom Zig runtime config.
# Local development reads this file from the current directory.
# Installed runtime reads ~/.config/phenom/config.toml when no local config.toml exists.

backend = "llamacpp"
host = "127.0.0.1"
port = 11434
model = "phenom:latest"

# auto | on | off
thinking = "auto"

max_tokens = 512
no_color = false
offline = false
fail_on_model_error = false
show_expect_status = false

# Optional operational defaults. Keep disabled unless needed.
# session = "default"
# server = "http://127.0.0.1:11434"
# expect_contains = "expected visible text"
# demo_read_file = "src/main.zig"
